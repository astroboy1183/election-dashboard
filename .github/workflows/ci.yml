name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel in-flight runs when new commits land on the same branch.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend (TS + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      # Lint is currently informational only — `npm run lint` reports several
      # pre-existing issues (mostly relaxed-rule warnings). Re-enable as a
      # required check once those are cleaned up.
      - name: Lint (non-blocking)
        run: npm run lint || true

      - name: Type-check
        run: npx tsc --noEmit -p .

      - name: Build
        run: npm run build

  backend:
    name: Backend (imports + smoke test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Import-check (catches syntax errors + missing modules)
        run: |
          python -c "
          import backend.main, backend.db, backend.models
          import backend.routes.constituencies, backend.routes.candidates
          import backend.routes.overview, backend.routes.kpis
          import backend.routes.swing, backend.routes.loksabha
          import backend.routes.insights, backend.routes.ai, backend.routes.geojson
          import backend.scrapers.eci, backend.scrapers.myneta, backend.scrapers.historical
          print('All backend modules import cleanly.')
          "

      - name: Smoke test (server boots and responds to /api/states)
        run: |
          python -m uvicorn backend.main:app --host 127.0.0.1 --port 8000 &
          UVICORN_PID=$!
          for i in {1..15}; do
            curl -fs http://127.0.0.1:8000/api/states > /dev/null && break || sleep 1
          done
          curl -fsS http://127.0.0.1:8000/api/states | python -c "import sys, json; d=json.load(sys.stdin); assert isinstance(d, list) and len(d) == 5, f'expected 5 states, got {d}'; print(f'/api/states OK — {len(d)} states')"
          kill $UVICORN_PID
